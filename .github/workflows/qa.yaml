name: QA and Tests (matrix + concurrency)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Run Ruff linter
        run: uvx ruff check

  tests:
    runs-on: ubuntu-latest
    needs: qa

    steps:
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install the project
        run: uv sync

      - name: Test with pytest
        run: uvx pytest -vv
